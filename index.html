<!DOCTYPE html>
<html lang="my">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #1a202c; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        input { display: block; width: 90%; margin: 10px auto; padding: 12px; border-radius: 5px; border: none; }
        button { width: 90%; padding: 12px; margin: 5px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
        .green { background: #28a745; color: white; }
        .red { background: #dd4b39; color: white; }
    </style>
</head>
<body>
    <h1>Myanmar Earn</h1>
    <input id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    
    <button class="green" onclick="login()">Email ဖြင့် Login ဝင်ရန်</button>
    <button class="red" onclick="googleLogin()">Google (Gmail) ဖြင့် Login ဝင်ရန်</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithRedirect, getRedirectResult } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const app = initializeApp({
            apiKey: "AIzaSyAncEZ0yFm9g47lwaXoAIn-XYmY0tQPHE",
            authDomain: "myanmar-b0fce.firebaseapp.com",
            projectId: "myanmar-b0fce",
            storageBucket: "myanmar-b0fce.appspot.com",
            messagingSenderId: "770654697940",
            appId: "1:770654697940:web:fccfb24d410868c4fc7c41"
        });

        const auth = getAuth(app);
        
        window.login = () => {
            const email = document.getElementById("email").value;
            const pass = document.getElementById("password").value;
            signInWithEmailAndPassword(auth, email, pass)
                .then(() => window.location.href = "ads.html")
                .catch(e => alert("Error: " + e.message));
        };

        window.googleLogin = () => {
            signInWithRedirect(auth, new GoogleAuthProvider());
        };

        getRedirectResult(auth).then((result) => {
            if (result) window.location.href = "ads.html";
        });
    </script>
</body>
</html>
