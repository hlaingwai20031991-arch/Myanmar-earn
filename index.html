<!DOCTYPE html>
<html>
<body>
    <h1>Login စမ်းသပ်ရန်</h1>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="loginUser()">Login ဝင်ရန်</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAncEZ0yFm9g47lwaXoAIn-XYmY0tQPHE",
            authDomain: "myanmar-b0fce.firebaseapp.com",
            projectId: "myanmar-b0fce",
            storageBucket: "myanmar-b0fce.appspot.com",
            messagingSenderId: "770654697940",
            appId: "1:770654697940:web:fccfb24d410868c4fc7c41"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.loginUser = () => {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            signInWithEmailAndPassword(auth, email, password)
                .then(() => alert("အောင်မြင်သည်!"))
                .catch((e) => alert("Error: " + e.message));
        };
    </script>
</body>
</html>
