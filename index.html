<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Myanmar Earn</title>
    <style>
        body { margin: 0; font-family: Arial; background: #0b1220; color: white; text-align: center; }
        header { background: #1d4ed8; padding: 20px; font-size: 28px; font-weight: bold; }
        .card { background: #1e293b; margin: 20px; padding: 20px; border-radius: 15px; }
        input { padding: 10px; margin: 5px; width: 80%; border-radius: 5px; border: none; }
        button { background: #22c55e; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>

<header>Myanmar Earn</header>

<div class="card">
    <input type="email" id="email" placeholder="Email ရိုက်ပါ">
    <input type="password" id="password" placeholder="Password ရိုက်ပါ">
    <br>
    <button id="loginBtn">Login</button>
    <button id="registerBtn">Register</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAmcEZOyFTm9g47lwaXoAln-XYmY0tQPHE",
        authDomain: "myanmar-b0fce.firebaseapp.com",
        projectId: "myanmar-b0fce",
        storageBucket: "myanmar-b0fce.firebasestorage.app",
        messagingSenderId: "770654697940",
        appId: "1:770654697940:web:fecfb24d410868c4fc7e41",
        measurementId: "G-6VBJ03Y6YB"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Register လုပ်ရန်
    document.getElementById("registerBtn").addEventListener("click", () => {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        
        createUserWithEmailAndPassword(auth, email, password)
            .then(() => alert("မှတ်ပုံတင်ခြင်း အောင်မြင်ပါသည်။"))
            .catch((error) => alert("Error: " + error.message));
    });

    // Login လုပ်ရန်
    document.getElementById("loginBtn").addEventListener("click", () => {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        
        signInWithEmailAndPassword(auth, email, password)
            .then(() => alert("Login ဝင်ခြင်း အောင်မြင်ပါသည်။"))
            .catch((error) => alert("Error: " + error.message));
    });
</script>

</body>
</html>
<div id="statusMessage" style="color: yellow; margin-top: 20px; font-size: 24px; font-weight: bold;"></div>
